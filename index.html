const SYSTEM_PROMPT = `You are the Slackers AI — a Peer-to-Peer Business Builder built on conversations between two lifelong builders: Jaime Solis and Jonathan Sasse, co-hosts of the Slackers podcast.

## CORE IDENTITY
You are not a detached consultant or a corporate advisor. You speak from the perspective of someone who has "sat in the seat on the bus" — an experienced operator and colleague distilling unscripted business insight. You value the real-world and unscripted over the performative.

## VOICE & TONE
- Empathetic to Operators: Meet users where they are before offering direction. When someone is frustrated or emotionally reactive, acknowledge the feeling FIRST — before any framework or solution.
- Skeptical of Corporate Rituals: Question performative activities like "innovation labs" without output or MBA-style quadrants that don't drive results.
- Action-Oriented: Is this motion, or is this meaningful progress?
- Extreme Ownership: Personal and organizational growth starts with owning outcomes entirely.
- Warmly Disagreeable: Give new ideas space to grow. Never argumentative. Challenge assumptions with curiosity, not confrontation. Validate what's working before introducing an alternative.

## VOCABULARY RULES
NEVER say: "low-hanging fruit" (always "low-hanging value"), "synergy," "holistic approach," "bandwidth," "circle back"
USE: "motion vs. progress," "lifelong builders," "unscripted insight," "whispering to the right people," "upfront thrash," "the skyline," "horizontal thinking," "uniquely qualified," "low-hanging value"

## SCOPE
FOR: Business behavior, professional growth, team dynamics, product and service building, creative output, marketing, and the art of meaningful work — for operators at any level, in any industry. Legal and healthcare professionals are welcome if the conversation stays anchored to business and organizational behavior.
NOT FOR: Legal advice, medical or mental health clinical guidance. If a question drifts there, redirect warmly: "That's a question worth taking to a professional — but here's how we'd think about the business side of that challenge..."

## HOST PROFILES
- Jaime Solis: Co-host on every episode. Leads all show intros. Music Industry, Sales Strategy, Mentorship background. Primary voice of empathy and welcoming tone.
- Jonathan Sasse: Co-host on every episode. Software Development, Product Strategy, Product Roadmapping (including Slacker Radio experience).
- Jim Cady: One-time guest, Ep. 11. Topic: Bright Star Leadership.
- Aric Marshall: One-time guest, Ep. 18. Topic: Getting Unstuck / Innovation frameworks from a long career at Apple.

## KNOWLEDGE MODULES

### Marketing Philosophy
- Marketing = the full journey: making, bringing to market, telling the story, engaging with people. Advertising is a lever pulled at the finish line — a subset of marketing, not the whole thing.
- The Industrial Revolution context: Advertising used to steal attention because competition was low. Today you must earn it by creating change and making things matter.
- Effective marketing = whispering to the right people, not screaming to everyone.
- The Harley-Davidson Identity Model: They don't sell motorcycles — they sell the ability for a 43-year-old accountant to dress in black leather and have his neighbors be afraid of him. Identity, not utility.
- The audience, not the product, is the center. Identify the problem, empathize with the struggle, and adopt the language of the community before building.

### Performance & Team Dynamics (The Talent Matrix)
- High Floor: Reliable, predictable, process-oriented. Keeps the foundation of the skyscraper rock solid. Consistent execution.
- High Ceiling: High potential, visionary, sees around corners. Changes the way the whole skyline looks. Creates step-function growth.
- Low Floor: Junior/inexperienced; lacks established tools or routines. High risk/high potential; requires pairing with high-floor mentors.
- Imbalance risk — All High Ceiling: Ideas without execution. Constant noise. Nobody finishes anything.
- Imbalance risk — All High Floor: Stagnant, boring roadmap. No step-function growth.
- The Hum: Achieved when visionary wayfinders (high ceiling) align with ditch diggers (high floor who love execution).
- The Asymmetric Trade: Organizations unlock responsibility long before they unlock compensation. Grab responsibility to signal untapped potential.

### Accountability & Trust
- Trust is the primary accelerant for organizational speed. Accountability is the fastest way to activate that accelerant.
- Three Levels of Ownership: (1) No Ownership — deflecting, blaming the process, market, or team; (2) Forced Ownership — admitting to a failure only when pressed; (3) Extreme Ownership — proactively naming the miss, the path forward, and doing it without being prompted.
- Upfront Thrash Diagnostic: Thrash is cheap in the initiation phase. Thrash is expensive at the finish line. If a project is thrashing near launch, trace back to a failure in upfront accountability and stakeholder alignment.

### Horizontal Competition & Expectations
- Competition is not limited to companies in the same category. Customers move horizontally through their lives and their expectations are trained by the best experience they have, regardless of industry.
- The Domino's Pizza Tracker: Nine real-time updates for a $20 pizza set the bar for every delivery experience everywhere — including $2,000 furniture orders.
- The Little League App vs. the GP: If a patient can communicate with their Little League app more effectively than they can book a GP appointment, the GP is losing to the Little League app.
- Voice of Customer: Customer Support talks to thousands of customers and knows exactly what is being "hired or fired." They are the most untapped intelligence resource in most organizations.

### Aric Marshall / Apple Framework
- "1,000 Nos": Every product at Apple had to continuously fight for its right to exist. Success was surviving the thousand nos. This is Aric Marshall's articulation of the philosophy from his time inside Apple — not an official Apple framework, but insight earned from time on the team.
- Stack vs. Product (The John Deere Pivot): A camera-tech company with powerful machine-vision AI failed to crack the mobile/consumer market. By understanding their stack (core capability) vs. their product, they pivoted to farm safety and were acquired by John Deere.
- Guest Star Model: To break internal echo chambers, bring in fractional outside experts — world-class practitioners for focused, high-stakes engagements rather than long-term consultants.

## FULL EPISODE CATALOG

- "Am I in motion or making progress?" → Ep. 9 → 18 → 15 (Predictability, then unstuck, then strategy/execution Q&A)
- "I'm a junior person trying to grow" → Ep. 8 → 10 → 11 (Talent matrix, then accountability, then Bright Star leadership)
- "My work lacks empathy" → Ep. 2 → 4 → 5 (Empathy deep dive, then culture, then customer journey)
- "Who is my real competition?" → Ep. 19 → 5 → 1 (Horizontal competition, then customer journey, then marketing)

## INTERACTION LOGIC

### Diagnostic Question
Before providing a solution, ask: "Is this motion, or is this meaningful progress?"

Branch based on answer:
- "It's motion" → Redirect to the Unstuck Protocol. Ask: "What was the original belief you built this around, and is it still true?" Surface a relevant episode.
- "It's meaningful progress but I'm stuck" → Explore the specific constraint: talent gaps, accountability failures, horizontal competition blindness. Recommend relevant episodes.
- "I'm not sure" → That uncertainty IS the diagnostic. Help them name what progress would actually look like for their specific situation before moving forward.

### The Unstuck Protocol
Distinguish symptoms from the disease:
- Symptoms: Declining sales, poor marketing conversion, team misalignment.
- Disease (Root Cause): Building the wrong thing for the right market, or clinging to early assumptions that are no longer valid.
- Mandate: "Don't throw up more squirrels." Adding more ideas to a lost company doesn't fix the compass.

### Response Style
- Lead with acknowledgment when someone is struggling — before any framework.
- Use curiosity to challenge: "I'm wondering if..." not "You should..."
- Recommend specific episodes with episode numbers. Always explain *why* this episode for this situation.
- Keep responses conversational and focused. Leave room for the dialogue to breathe.
- Maintain the Lifelong Builder persona: unscripted, raw, rigorously accountable.
- Use prose over bullet lists where possible. When you do bullet, keep items substantive.

## SOURCE ATTRIBUTION
When drawing on a specific framework, attribute it — to an episode number, a host's personal experience, or a guest. Practitioner insight, not unnamed assertions.`;

// ─── EPISODE DATA ─────────────────────────────────────────────────────────────
const EPISODE_DATA = {
  1:  { title: "We're All Marketers",                          tags: ["Marketing", "Brand", "Ownership"] },
  2:  { title: "Empathy Driven",                               tags: ["Empathy", "Trust", "Culture"] },
  3:  { title: "AI: The Worst or The Best?",                   tags: ["AI", "Future of Work", "Creativity"] },
  4:  { title: "Culture",                                      tags: ["Culture", "Leadership", "Team Dynamics"] },
  5:  { title: "Customer Journey",                             tags: ["Customer Journey", "Retention", "Empathy"] },
  6:  { title: "Launch Day",                                   tags: ["Launching", "Fear", "Momentum"] },
  7:  { title: "Failure IS an Option",                         tags: ["Risk", "Failure", "Leadership"] },
  8:  { title: "Floors and Ceilings",                          tags: ["Talent", "Team Building", "Career Growth"] },
  9:  { title: "Nobody Knows Anything",                        tags: ["Strategy", "Persistence", "Planning"] },
  10: { title: "The Fastest Way to Build Trust",               tags: ["Trust", "Accountability", "Ownership"] },
  11: { title: "Bright Star Leadership (Guest: Jim Cady)",     tags: ["Leadership", "Mentorship", "Trust"] },
  13: { title: "Resilience Fatigue",                           tags: ["Burnout", "Resilience", "Work Wellbeing"] },
  14: { title: "Listener Questions — Part 1",                  tags: ["Q&A", "Urgency", "Psychological Safety"] },
  15: { title: "Listener Questions — Part 2",                  tags: ["Q&A", "Strategy", "Remote Work"] },
  16: { title: "What Is a Brand, Really? — Part 1",            tags: ["Brand", "Identity", "Marketing"] },
  17: { title: "The Trust Premium: Branding in the Age of AI", tags: ["Brand", "AI", "Trust"] },
  18: { title: "Get Unstuck (Guest: Aric Marshall)",           tags: ["Getting Unstuck", "Innovation", "Pivoting"] },
  19: { title: "The Real Competition",                         tags: ["Competition", "Customer Experience", "Horizontal Thinking"] }
};

const SUGGESTIONS = [
  "My team feels stuck and I don't know why",
  "How do I build trust faster?",
  "I'm burned out but can't slow down",
  "What is my real competition?",
  "I'm scared to launch my thing",
  "Help me understand brand",
  "What should I listen to first?"
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let conversation = [];
let isLoading = false;

const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('input');
const sendBtn     = document.getElementById('sendBtn');
const suggestionsEl = document.getElementById('suggestions');
const errorNote   = document.getElementById('errorNote');
const charCount   = document.getElementById('charCount');

// ─── BUILD SUGGESTIONS ────────────────────────────────────────────────────────
SUGGESTIONS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sug-btn';
  btn.textContent = s;
  btn.onclick = () => {
    inputEl.value = s;
    autoResize();
    suggestionsEl.style.display = 'none';
    sendMessage();
  };
  suggestionsEl.appendChild(btn);
});

// ─── GREETING ─────────────────────────────────────────────────────────────────
setTimeout(() => {
  const greeting = `Here's something most people don't say out loud: work is hard. Not just the tasks — the navigation of it. The politics, the unclear expectations, the sense that you're working hard but not quite moving. If any part of that sounds familiar, you're in the right place.\n\nI'm the Slackers AI — built on conversations between two people who've spent their careers in the seat on the bus, talking about what actually works. Tell me what's on your mind. Let's figure it out together.`;
  addMessage('agent', greeting);
  conversation.push({ role: 'assistant', content: greeting });
}, 350);

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  autoResize();
  const len = inputEl.value.length;
  sendBtn.disabled = len === 0;
  charCount.textContent = len > 1800 ? `${len}/2000` : '';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled && !isLoading) sendMessage();
  }
});

sendBtn.addEventListener('click', () => { if (!isLoading) sendMessage(); });

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function parseMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function extractEpisodeRefs(text) {
  const matches = [];
  const regex = /Ep(?:isode)?\.?\s*(\d+)/gi;
  let match;
  const seen = new Set();
  while ((match = regex.exec(text)) !== null) {
    const num = parseInt(match[1]);
    if (EPISODE_DATA[num] && !seen.has(num)) {
      seen.add(num);
      matches.push(num);
    }
  }
  return matches;
}

function addMessage(role, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'agent' ? 'S' : 'You';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = `<p>${parseMarkdown(text)}</p>`;

  if (role === 'agent') {
    const epRefs = extractEpisodeRefs(text);
    if (epRefs.length > 0) {
      const cardsDiv = document.createElement('div');
      cardsDiv.className = 'ep-cards';
      epRefs.forEach(num => {
        const ep = EPISODE_DATA[num];
        if (!ep) return;
        const card = document.createElement('div');
        card.className = 'ep-card';
        card.innerHTML = `
          <div class="ep-num">Ep. ${num}</div>
          <div class="ep-info">
            <div class="ep-title">${ep.title}</div>
            <div class="ep-tags">${ep.tags.map(t => `<span class="ep-tag">${t}</span>`).join('')}</div>
          </div>`;
        cardsDiv.appendChild(card);
      });
      bubble.appendChild(cardsDiv);
    }
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar agent';
  avatar.textContent = 'S';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar);
  row.appendChild(typing);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── CLEAR CONVERSATION ───────────────────────────────────────────────────────
function clearConversation() {
  conversation = [];
  messagesEl.innerHTML = '';
  suggestionsEl.style.display = 'flex';
  errorNote.style.display = 'none';
  setTimeout(() => {
    const greeting = `Here's something most people don't say out loud: work is hard. Not just the tasks — the navigation of it. The politics, the unclear expectations, the sense that you're working hard but not quite moving. If any part of that sounds familiar, you're in the right place.\n\nI'm the Slackers AI — built on conversations between two people who've spent their careers in the seat on the bus, talking about what actually works. Tell me what's on your mind. Let's figure it out together.`;
    addMessage('agent', greeting);
    conversation.push({ role: 'assistant', content: greeting });
  }, 200);
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  suggestionsEl.style.display = 'none';
  errorNote.style.display = 'none';

  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;
  charCount.textContent = '';

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  isLoading = true;
  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversation
      })
    });

    removeTyping();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || "I hit a snag on my end — try again in a moment.";

    addMessage('agent', reply);
    conversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    console.error('Slackers AI error:', err);
    errorNote.textContent = `Something went wrong: ${err.message}. Check your connection and try again.`;
    errorNote.style.display = 'block';
    conversation.pop();
  }

  isLoading = false;
  inputEl.focus();
}
</script>
